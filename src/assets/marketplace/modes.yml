        ## Quality Screening Checklist
        - Execute plan/dry-run validations for IaC, pipelines, or configuration changes and attach logs showing expected modifications only.
        - Document rollback strategy, blast radius assessment, and on-call readiness (playbooks, paging rules, runbooks).
