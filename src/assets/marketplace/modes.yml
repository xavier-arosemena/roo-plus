        ```javascript
        // Modern Performance Optimization Script
        class CoreWebVitalsOptimizer {
         constructor() {
         this.metrics = {
         LCP: null,
         INP: null, // New metric replacing FID
         CLS: null
         };
         this.initializeMetrics();
         }
         
         initializeMetrics() {
         // Web Vitals library for accurate measurement
         import('web-vitals').then(({ onLCP, onINP, onCLS }) => {
         onLCP((metric) => {
         this.metrics.LCP = metric.value;
         this.optimizeLCP(metric);
         });
         
         onINP((metric) => {
         this.metrics.INP = metric.value;
         this.optimizeINP(metric);
         });
         
         onCLS((metric) => {
         this.metrics.CLS = metric.value;
         this.optimizeCLS(metric);
         });
         });
         }
         
         optimizeLCP(metric) {
         if (metric.value > 2500) {
         // Critical LCP optimization
         this.preloadCriticalResources();
         this.optimizeImages();
         this.removeRenderBlockingCSS();
         }
         }
         
         optimizeINP(metric) {
         if (metric.value > 200) {
         // INP-specific optimizations
         this.implementCodeSplitting();
         this.optimizeJavaScriptExecution();
         this.useWebWorkers();
         }
         }
         
         optimizeCLS(metric) {
         if (metric.value > 0.1) {
         // Layout shift prevention
         this.reserveSpaceForDynamicContent();
         this.preloadFonts();
         this.setImageDimensions();
         }
         }
         
         preloadCriticalResources() {
         const criticalResources = [
         { href: '/fonts/main.woff2', as: 'font', type: 'font/woff2' },
         { href: '/images/hero.webp', as: 'image' },
         { href: '/css/critical.css', as: 'style' }
         ];
         
         criticalResources.forEach(resource => {
         const link = document.createElement('link');
         link.rel = 'preload';
         Object.assign(link, resource);
         document.head.appendChild(link);
         });
         }
         
         implementCodeSplitting() {
         // Dynamic imports for non-critical JavaScript
         const loadNonCriticalJS = () => {
         import('./non-critical.js').then(module => {
         module.initialize();
         });
         };
         
         // Load after user interaction or page idle
         if ('requestIdleCallback' in window) {
         requestIdleCallback(loadNonCriticalJS);
         } else {
         setTimeout(loadNonCriticalJS, 1000);
         }
         }
         
         optimizeImages() {
         // Modern image optimization
         const images = document.querySelectorAll('img[data-src]');
         
         const imageObserver = new IntersectionObserver((entries) => {
         entries.forEach(entry => {
         if (entry.isIntersecting) {
         const img = entry.target;
         
         // Use modern formats
         if (this.supportsWebP()) {
         img.src = img.dataset.webp || img.dataset.src;
         } else {
         img.src = img.dataset.src;
         }
         
         img.onload = () => img.classList.add('loaded');
         imageObserver.unobserve(img);
         }
         });
         }, { rootMargin: '50px' });
         
         images.forEach(img => imageObserver.observe(img));
         }
         
         supportsWebP() {
         const canvas = document.createElement('canvas');
         canvas.width = canvas.height = 1;
         return canvas.toDataURL('image/webp').indexOf('data:image/webp') === 0;
         }
        }

        // Initialize optimizer
        const optimizer = new CoreWebVitalsOptimizer();
        ```

