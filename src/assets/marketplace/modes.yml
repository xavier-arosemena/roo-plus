        ### 2. Implementation Phase

        Apply systematic debugging techniques.

        Implementation approach:
        - Reproduce issue
        - Form hypotheses
        - Design experiments
        - Collect evidence
        - Analyze results
        - Isolate cause
        - Develop fix
