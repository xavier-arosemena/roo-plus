        ## 🚀 Release It! Production Stability Rules (from agent-rules-books/Release It!)

        ### Decision Rules
        - Treat every external call, shared resource, network hop, and integration point as a potential failure source.
        - Use timeouts on all external calls. Default to fail-fast; use longer timeouts only when the caller can usefully wait.
        - Use circuit breakers around external dependencies. Open the breaker after repeated failures; give the dependency time to recover.
        - Use bulkheads to isolate critical paths from non-critical failures. One slow downstream service must not exhaust threads or connections.
        - Limit retries with exponential backoff and jitter. Unlimited retries amplify load during outages.
        - Validate input at system boundaries. Reject malformed data before it enters processing.
        - Design for graceful degradation. Shed load, return cached data, or disable features rather than cascading failure.
        - Make every state transition explicit and recoverable. Avoid implicit state machines in flags, nulls, or status strings.
        - Use health checks that verify real dependency availability, not just process liveness.
        - Ensure logging, tracing, and metrics cover every external call, state transition, and error path.

        ### Trigger Rules
        - When adding an external call → add timeout, circuit breaker, and error logging.
        - When a shared resource has no limit → add a pool, semaphore, or queue with backpressure.
        - When a failure path has no recovery → add fallback, cache, or graceful degradation.
        - When a slow operation blocks critical work → move it to a bulkhead or async path.

        ## 📡 Observability Setup Protocol (from TerminalSkills)

        ### The Three Pillars
        1. **Metrics**: Counter, gauge, histogram — track SLIs (latency, error rate, throughput, saturation)
        2. **Logs**: Structured JSON, correlation IDs, log levels (debug/info/warn/error)
        3. **Traces**: Distributed tracing with OpenTelemetry — trace request across services

        ### SLO Framework
        - Define SLIs (Service Level Indicators): latency p99, error rate, availability
        - Set SLOs (Service Level Objectives): 99.9% availability, p99 < 500ms
        - Calculate error budget: (1 - SLO) × time_window = allowed downtime
        - Burn rate alerts: Fast burn (14.4x), Slow burn (6x), Page vs Ticket

        ### Instrumentation Priority
        1. Ingress/Egress boundaries (every external call)
        2. Critical business transactions
        3. Database queries and cache operations
        4. Background jobs and async processing

        ## 📊 Performance Review Protocol (from TerminalSkills)

        ### Analysis Method
        1. **Measure first**: Profile before optimizing. Use flame graphs, traces, benchmarks
        2. **Identify bottleneck**: CPU, memory, I/O, network, or lock contention
        3. **Quantify impact**: What percentage of total latency does this bottleneck represent?
        4. **Fix the biggest win first**: 80/20 rule — one fix often solves 80% of the problem

        ### Common Patterns
        - **N+1 queries**: Batch or eager-load instead of per-row queries
        - **Unnecessary serialization**: Avoid JSON parse/stringify in hot paths
        - **Missing indexes**: Add database indexes for frequent query patterns
        - **Excessive allocation**: Reuse buffers, pool objects, avoid GC pressure
        - **Lock contention**: Use lock-free structures, reduce critical section size

        ### Verification
        - Benchmark before AND after with realistic data volumes
        - Measure p50, p95, p99 — not just averages
        - Run load tests at 2x expected peak traffic
