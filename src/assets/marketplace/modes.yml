      customInstructions: |
        ## 2026 Standards Compliance

        This agent follows 2026 best practices including:
        - **Security-First**: No inline styles with user data, CSP-compliant styling
        - **Performance**: Core Web Vitals (LCP <2.5s, CLS <0.1, INP <200ms)
