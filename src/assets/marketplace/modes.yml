        ### **2. LCP (Largest Contentful Paint) Optimization**
        ```javascript
        // Advanced LCP Optimization System
        class LCPOptimizer {
         constructor() {
         this.lcpElement = null;
         this.lcpValue = null;
         
         this.monitorLCP();
         this.implementLCPOptimizations();
         }
         
         monitorLCP() {
         // Monitor LCP with detailed analysis
         if ('web-vitals' in window || typeof webVitals!== 'undefined') {
         webVitals.onLCP((metric) => {
         this.lcpValue = metric.value;
         
         console.log('LCP Analysis:');
         console.log('- Value:', metric.value, 'ms');
         console.log('- Element:', metric.entries[0]?.element);
         console.log('- URL:', metric.entries[0]?.url);
         
         if (metric.value > 2500) {
         this.optimizeLCP(metric);
         }
         });
         }
         }
         
         implementLCPOptimizations() {
         // 1. Preload critical resources
         this.preloadCriticalResources();
         
         // 2. Optimize images
         this.implementAdvancedImageOptimization();
         
         // 3. Eliminate render-blocking resources
         this.eliminateRenderBlocking();
         
         // 4. Use modern image formats
         this.implementModernImageFormats();
         }
         
         preloadCriticalResources() {
         const criticalResources = [
         // Hero image
         { href: '/images/hero.webp', as: 'image', type: 'image/webp' },
         // Critical fonts
         { href: '/fonts/main.woff2', as: 'font', type: 'font/woff2', crossorigin: '' },
         // Critical CSS
         { href: '/css/critical.css', as: 'style' },
         // Important scripts
         { href: '/js/critical.js', as: 'script' }
         ];
         
         criticalResources.forEach(resource => {
         const existingPreload = document.querySelector(`link[href="${resource.href}"]`);
         
         if (!existingPreload) {
         const link = document.createElement('link');
         link.rel = 'preload';
         Object.assign(link, resource);
         document.head.appendChild(link);
         }
         });
         }
         
         implementAdvancedImageOptimization() {
         // Modern responsive images with optimal loading
         const images = document.querySelectorAll('img');
         
         images.forEach((img, index) => {
         // Priority loading for above-fold images
         if (index < 3) {
         img.loading = 'eager';
         img.decoding = 'sync';
         } else {
         img.loading = 'lazy';
         img.decoding = 'async';
         }
         
         // Add modern format support
         if (!img.srcset && img.dataset.srcset) {
         img.srcset = img.dataset.srcset;
         }
         
         // Implement proper aspect ratio
         if (img.dataset.width && img.dataset.height) {
         const aspectRatio = (img.dataset.height / img.dataset.width) * 100;
         img.style.aspectRatio = `${img.dataset.width} / ${img.dataset.height}`;
         }
         });
         }
         
         eliminateRenderBlocking() {
         // Critical CSS inlining
         const criticalCSS = `
         /* Critical above-fold styles */.hero { 
         display: flex; 
         min-height: 100vh; 
         background: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
         }.hero h1 { 
         font-size: 3rem; 
         color: white; 
         margin: 0;
         }
         `;
         
         // Inject critical CSS
         const style = document.createElement('style');
         style.textContent = criticalCSS;
         document.head.appendChild(style);
         
         // Load non-critical CSS asynchronously
         this.loadNonCriticalCSS(['/css/main.css', '/css/components.css']);
         }
         
         loadNonCriticalCSS(cssFiles) {
         cssFiles.forEach(file => {
         const link = document.createElement('link');
         link.rel = 'stylesheet';
         link.href = file;
         link.media = 'print'; // Load without blocking
         
         link.onload = () => {
         link.media = 'all'; // Apply once loaded
         };
         
         document.head.appendChild(link);
         });
         }
         
         implementModernImageFormats() {
         // WebP and AVIF support with fallbacks
         const pictureElements = document.querySelectorAll('img[data-src]');
         
         pictureElements.forEach(img => {
         const picture = document.createElement('picture');
         
         // AVIF source (best compression)
         if (img.dataset.avif) {
         const avifSource = document.createElement('source');
         avifSource.srcset = img.dataset.avif;
         avifSource.type = 'image/avif';
         picture.appendChild(avifSource);
         }
         
         // WebP source (good compression + support)
         if (img.dataset.webp) {
         const webpSource = document.createElement('source');
         webpSource.srcset = img.dataset.webp;
         webpSource.type = 'image/webp';
         picture.appendChild(webpSource);
         }
         
         // Original image as fallback
         img.src = img.dataset.src;
         picture.appendChild(img);
         
         // Replace original img with picture
         img.parentNode.replaceChild(picture, img);
         });
         }
         
         optimizeLCP(metric) {
         const recommendations = [];
         
         if (metric.value > 4000) {
         recommendations.push('Critical: LCP > 4s - Server response time likely too slow');
         recommendations.push('Consider CDN, server optimization, or static generation');
         } else if (metric.value > 2500) {
         recommendations.push('Optimize largest content element:');
         recommendations.push('- Preload hero images/videos');
         recommendations.push('- Inline critical CSS');
         recommendations.push('- Remove render-blocking JavaScript');
         }
         
         console.group('LCP Optimization Plan:');
         recommendations.forEach(rec => console.log(rec));
         console.groupEnd();
         
         return recommendations;
         }
        }

        // Initialize LCP optimizer
        const lcpOptimizer = new LCPOptimizer();
        ```

        ### **3. CLS (Cumulative Layout Shift) Prevention**
