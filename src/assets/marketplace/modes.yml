         webVitals.onCLS((metric) => {
         console.log('CLS Score:', metric.value);
         
         if (metric.value > 0.1) {
         this.analyzeLayoutShifts(metric);
         }
         });
         }
         
         // Observe individual layout shifts
         if ('PerformanceObserver' in window) {
         const observer = new PerformanceObserver((list) => {
         for (const entry of list.getEntries()) {
         if (!entry.hadRecentInput) {
         console.warn('Layout shift detected:', entry);
         this.handleLayoutShift(entry);
         }
         }
         });
         
         observer.observe({ entryTypes: ['layout-shift'] });
         }
         }
         
         implementPreventionMeasures() {
         // 1. Set image dimensions
         this.setImageDimensions();
         
         // 2. Reserve ad spaces
         this.reserveAdSpaces();
         
         // 3. Handle dynamic content
         this.handleDynamicContent();
         
         // 4. Font loading optimization
         this.optimizeFontLoading();
         }
         
         setImageDimensions() {
         const images = document.querySelectorAll('img:not([width]):not([height])');
         
         images.forEach(img => {
         // Use intersection observer to set dimensions before loading
         const observer = new IntersectionObserver((entries) => {
         entries.forEach(entry => {
         if (entry.isIntersecting) {
         const img = entry.target;
         
         // Set placeholder dimensions
         if (img.dataset.width && img.dataset.height) {
         img.width = img.dataset.width;
         img.height = img.dataset.height;
         }
         
         observer.unobserve(img);
         }
         });
         }, { rootMargin: '50px' });
         
         observer.observe(img);
         });
         }
         
         reserveAdSpaces() {
         const adContainers = document.querySelectorAll('.ad-slot');
         
         adContainers.forEach(container => {
         // Set minimum height before ad loads
         const adType = container.dataset.adType;
         const dimensions = this.getAdDimensions(adType);
         
         container.style.minHeight = dimensions.height + 'px';
         container.style.minWidth = dimensions.width + 'px';
         
         // Add loading placeholder
         container.innerHTML = `
         <div class="ad-placeholder" style="
         width: 100%;
         height: ${dimensions.height}px;
         background: #f5f5f5;
         display: flex;
         align-items: center;
         justify-content: center;
         color: #999;
         font-size: 14px;
         ">Advertisement Loading...</div>
         `;
         });
         }
         
         getAdDimensions(adType) {
         const dimensions = {
         'banner': { width: 728, height: 90 },
         'rectangle': { width: 300, height: 250 },
         'skyscraper': { width: 160, height: 600 },
         'leaderboard': { width: 970, height: 90 }
         };
         
         return dimensions[adType] || { width: 300, height: 250 };
         }
         
         handleDynamicContent() {
         // Mutation observer for dynamic content
         const observer = new MutationObserver((mutations) => {
         mutations.forEach(mutation => {
         if (mutation.type === 'childList') {
         mutation.addedNodes.forEach(node => {
         if (node.nodeType === Node.ELEMENT_NODE) {
         this.stabilizeNewElement(node);
         }
         });
         }
         });
         });
         
         observer.observe(document.body, {
         childList: true,
         subtree: true
         });
         }
         
         stabilizeNewElement(element) {
         // Prevent layout shifts from new elements
         if (element.tagName === 'IMG') {
         this.stabilizeImage(element);
         } else if (element.classList.contains('dynamic-content')) {
         this.stabilizeDynamicContent(element);
         }
         }
         
         optimizeFontLoading() {
         // Font loading API to prevent FOIT/FOUT
         if ('fonts' in document) {
         const fontPromises = [
         document.fonts.load('1em Primary'),
         document.fonts.load('bold 1em Primary'),
         document.fonts.load('italic 1em Primary')
         ];
         
         Promise.all(fontPromises).then(() => {
         document.body.classList.add('fonts-loaded');
         }).catch(() => {
         console.warn('Some fonts failed to load');
         });
         }
         }
        }

        // Initialize CLS prevention
        const clsPrevention = new CLSPreventionSystem();
