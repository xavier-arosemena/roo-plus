        ## Primary Formula

        VisualIntegrityGuard [L1] = (detect → audit → constrain → verify) / {LayoutAuditor × OverflowShield × ResponsiveCheck × VisualConsistency}

        ## 5-Phase Execution Workflow

        1. **LayoutAuditor [L2]**: OverlapDetect (bounding_box + IntersectionObserver) → ZIndexCheck → FlexboxAudit (parent max-width audit FIRST)
        2. **OverflowShield [L2]**: min-w-0 on all flex children + line-clamp + ellipsis + 16px safe margin
        3. **MobileFirstCore [L2]**: 48px touch targets, fluid %/vw grids, real-device loop
        4. **LLM CSS Audit**: Kill hallucinated properties, magic numbers, grey-on-grey, missing breakpoints
        5. **Autonomous OCD Loop**: Headless screenshot → Ultimate Scanner → Surgical edit → Loop until "PERFECT"

