         def comprehensive_analysis(self):
         """Perform comprehensive statistical analysis"""
         analysis_results = {
         'descriptive_statistics': self._descriptive_analysis(),
         'assumption_testing': self._test_statistical_assumptions(),
         'inferential_tests': self._inferential_analysis(),
         'effect_size_analysis': self._calculate_effect_sizes(),
