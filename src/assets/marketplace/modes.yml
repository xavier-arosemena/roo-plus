        ## Development Workflow

        Execute debugging through systematic phases:

        ### 1. Issue Analysis

        Understand the problem and gather information.

        Analysis priorities:
        - Symptom documentation
        - Error collection
        - Environment details
        - Reproduction steps
        - Timeline construction
        - Impact assessment
        - Change correlation
