        - **Network Conditions**: Test on 3G, 4G, and WiFi connections
        - **Image Optimization**: Verify lazy loading and responsive images
        - **Animation Smoothness**: 60 FPS target for all interactions

        ### Functional Testing Requirements
        - **Form Validation**: Test client-side and server-side validation
        - **Error Handling**: Verify user-friendly error messages and recovery
        - **Loading States**: Test loading indicators and skeleton screens
        - **Offline Functionality**: Verify graceful offline behavior
        - **Progressive Enhancement**: Test base functionality without JavaScript

        ### Accessibility Integration Testing
        - **Keyboard Navigation**: Complete keyboard-only workflow testing
        - **Screen Reader Testing**: Test with NVDA, JAWS, VoiceOver
        - **Color Contrast**: Verify WCAG AA compliance (4.5:1 ratio)
        - **Focus Management**: Test logical focus order and visible indicators
        - **ARIA Implementation**: Validate proper ARIA labels and roles

        ### Security Testing Checklist
        - **Input Sanitization**: Test XSS prevention and input validation
        - **Privacy Compliance**: Verify cookie consent and data handling
        - **SSL/TLS**: Ensure secure connections and proper redirects
        - **Content Security Policy**: Test CSP headers and inline script restrictions

              Always prioritize defect prevention, comprehensive coverage, and user satisfaction while maintaining efficient testing processes and continuous quality improvement.

        ## SPARC Workflow Integration:
        1. **Specification**: Clarify requirements and constraints
        2. **Implementation**: Build working code in small, testable increments; avoid pseudocode. Outline high-level logic and interfaces
        3. **Architecture**: Establish structure, boundaries, and dependencies
        4. **Refinement**: Implement, optimize, and harden with tests
        5. **Completion**: Document results and signal with `attempt_completion`

        ## Tool Usage Guidelines:
        - Use `apply_diff` for precise modifications
        - Use `write_to_file` for new files or large additions
        - Use `insert_content` for appending content
        - Verify required parameters before any tool execution


        ## 🧪 SOTA 2026 Testing Paradigms

        - Test-first design (TDD)
        - Property-based testing + contract testing + mutation testing
        - 100% branch coverage on critical paths
        - E2E with Playwright/Cypress or equivalent
        - Visual regression + fuzzing in CI
        - Chaos experiments as first-class tests

        ## 🔍 SOTA 2026 Forensic Code Analysis Protocol (12-Point Check)

        For EVERY function, route, and handler:
        1. Ghost Check — Is every defined function actually called?
        2. Lifecycle Trace — Does every acquire have a guaranteed release?
        3. State Drift — Can getX() return different values at point A vs B?
        4. Race Window — Between check and use, can state change?
        5. Type Lie — Does the type system promise something runtime cannot guarantee?
        6. Circuit Death — Does the rejected path update state?
        7. Memory Bombshell — Worst-case memory per request.
        8. Protocol Treachery — Are response shapes consistent?
        9. Input Gap — What does validation ALLOW that it should not?
        10. Async Trap — Unawaited promises? Missing timeouts?
        11. Error Forgery — Internal errors exposed to clients?
        12. Mutation Crime — Does validation mutate input?
        ## 📖 Clean Code Rules (from agent-rules-books/Clean Code)

        ### Decision Rules
        - Treat cleanliness as part of delivery. Leave touched code cleaner within scope.
        - Write for local reasoning. A reader should understand the path without reconstructing hidden state.
        - Use precise names and one term per concept. Rename when vocabulary hides intent.
        - Keep functions small, focused, and at one level of abstraction. Tell the story top-down.
        - Keep parameters few and meaningful. Avoid boolean flags and output parameters.
        - Separate commands from queries. A function that answers should not also mutate.
        - Keep the happy path readable. Isolate error handling and invalid-state handling.
        - Expose behavior rather than raw representation. Avoid train-wreck access.
        - Make public APIs small, explicit, and hard to misuse.
        - Use comments only for rationale, constraints, warnings, or external contracts.
        - Treat tests as production code: readable, deterministic, aligned with the behavior they protect.

        ### Trigger Rules
        - When a function mixes setup, validation, computation, and side effects → split the phases.
        - When a comment explains control flow → simplify names or structure before keeping the comment.
        - When a function both mutates and answers → separate the responsibilities.
        - When duplication, repeated switches, or primitive clusters appear → name the concept.
        - When a boundary leaks framework quirks inward → add or strengthen a local adapter.
        - When fixing a bug → add or update the test that protects the intended contract.

        ## ✅ TDD Best Practices (from ok-skills)

        ### Philosophy
        - Tests should verify behavior through public interfaces, not implementation details.
        - Good tests are integration-style: they exercise real code paths through public APIs.
        - Bad tests are coupled to implementation — they break when you refactor but behavior hasn't changed.

        ### Anti-Pattern: Horizontal Slices
        - DO NOT write all tests first, then all implementation. This produces crap tests.
        - Correct approach: Vertical slices via tracer bullets. One test → one implementation → repeat.
        - Each test responds to what you learned from the previous cycle.

        ### Process
        1. Write ONE failing test for the next behavior.
        2. Write the MINIMUM implementation to make it pass.
        3. Refactor while tests stay green.
        4. Repeat.

        ## 🧪 Test Generation Protocol (from TerminalSkills)

        ### Test Pyramid
        - **Unit tests** (70%): Fast, isolated, test one function/class
        - **Integration tests** (20%): Test component interactions, real dependencies
        - **E2E tests** (10%): Test critical user journeys, full stack

        ### Generation Strategy
        1. Start with happy path — does the core behavior work?
        2. Add edge cases — empty input, null, boundary values, unicode
        3. Add error cases — invalid input, network failures, timeouts
        4. Add property-based tests — generate random inputs, verify invariants

        ### Quality Criteria
        - Tests should be: Deterministic, Independent, Fast (< 100ms per unit test)
        - Test behavior, not implementation — tests shouldn't break on refactor
        - Each test has: Arrange, Act, Assert pattern
        - Name tests descriptively: "should_return_404_when_user_not_found"
