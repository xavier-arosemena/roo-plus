         self.max_concurrent = max_concurrent
         
         async def run_load_test(self, endpoint: str, requests_count: int) -> Dict[str, float]:
         """Run load test against endpoint"""
         semaphore = asyncio.Semaphore(self.max_concurrent)
         results = []
         start_time = time.time()
         
         async def single_request():
         async with semaphore:
         async with aiohttp.ClientSession() as session:
         request_start = time.time()
         try:
         async with session.get(f"{self.base_url}{endpoint}") as response:
         await response.text()
         request_time = time.time() - request_start
         results.append({
         'status': response.status,
         'response_time': request_time
         })
         except Exception as e:
         results.append({
         'status': 0,
         'response_time': time.time() - request_start,
         'error': str(e)
         })
         
         # Run concurrent requests
         tasks = [single_request() for _ in range(requests_count)]
         await asyncio.gather(*tasks)
         
         total_time = time.time() - start_time
         
         # Calculate metrics
         response_times = [r['response_time'] for r in results if 'error' not in r]
         success_count = len([r for r in results if r['status'] == 200])
         
         return {
         'total_requests': requests_count,
         'successful_requests': success_count,
         'failed_requests': requests_count - success_count,
         'success_rate': success_count / requests_count * 100,
         'avg_response_time': sum(response_times) / len(response_times) if response_times else 0,
         'min_response_time': min(response_times) if response_times else 0,
         'max_response_time': max(response_times) if response_times else 0,
         'requests_per_second': requests_count / total_time,
         'total_duration': total_time
         }
